  <g transform="translate(486, 110)" filter="url(#shadow)">
    <rect width="120" height="108" rx="12" fill="url(#purpleGrad)" />
    <path d="M42,36 C42,31 78,31 78,36 C78,41 42,41 42,36 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M42,36 V50 C42,55 78,55 78,50 V36" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M42,50 V64 C42,69 78,69 78,64 V50" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <text x="60" y="84" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">POSTGRESQL</text>
    <text x="60" y="96" font-family="system-ui, sans-serif" font-size="8" fill="#E9D5FF" text-anchor="middle">Prisma · 6 tables</text>
    <text x="60" y="106" font-family="system-ui, sans-serif" font-size="8" fill="#E9D5FF" text-anchor="middle">Invoice · Project</text>
  </g>

