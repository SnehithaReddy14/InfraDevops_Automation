  <g transform="translate(636, 110)" filter="url(#shadow)">
    <rect width="120" height="108" rx="12" fill="url(#emeraldGrad)" />
    <path d="M42,72 V48 H52 V72 Z M56,72 V38 H68 V72 Z M72,72 V58 H82 V72 Z" fill="#FFFFFF" opacity="0.9"/>
    <text x="60" y="88" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">ANALYTICS</text>
    <text x="60" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#A7F3D0" text-anchor="middle">Dashboard matrix</text>
    <text x="60" y="109" font-family="system-ui, sans-serif" font-size="8" fill="#A7F3D0" text-anchor="middle">Billing ledger</text>
  </g>

  <!-- Pipeline arrows -->
  <path d="M156,164 H182" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M306,164 H332" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M456,164 H482" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M606,164 H632" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Row label: Project workspace -->
  <text x="36" y="268" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">PROJECT WORKSPACE</text>

  <!-- 6 Projects UI -->
  <g transform="translate(96, 280)" filter="url(#shadow)">
    <rect width="130" height="108" rx="12" fill="url(#blueGrad)" />
    <rect x="44" y="36" width="42" height="32" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M52,48 H78 M52,56 H72" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="65" y="88" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">PROJECTS</text>
    <text x="65" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle">Infra · Invoices</text>
    <text x="65" y="109" font-family="system-ui, sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle">Billing tab</text>
  </g>

  <!-- 7 CloudResource -->
  <g transform="translate(276, 280)" filter="url(#shadow)">
    <rect width="130" height="108" rx="12" fill="url(#amberGrad)" />
    <circle cx="50" cy="48" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="80" cy="48" r="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M58,48 H72" stroke="#FFFFFF" stroke-width="2"/>
    <text x="65" y="78" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">INFRA / SaaS</text>
    <text x="65" y="90" font-family="system-ui, sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">CloudResource</text>
    <text x="65" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">seats · specs</text>
    <text x="65" y="109" font-family="system-ui, sans-serif" font-size="8" fill="#FDE68A" text-anchor="middle">dynamic forms</text>
  </g>

  <!-- 8 Billing view -->
  <g transform="translate(456, 280)" filter="url(#shadow)">
    <rect width="130" height="108" rx="12" fill="url(#indigoGrad)" />
    <rect x="40" y="38" width="50" height="8" rx="2" fill="#FFFFFF" opacity="0.9"/>
    <rect x="40" y="50" width="50" height="8" rx="2" fill="#FFFFFF" opacity="0.6"/>
    <rect x="40" y="62" width="50" height="8" rx="2" fill="#FFFFFF" opacity="0.6"/>
    <text x="65" y="84" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">BILLING VIEW</text>
    <text x="65" y="96" font-family="system-ui, sans-serif" font-size="8" fill="#C7D2FE" text-anchor="middle">Dynamic columns</text>
    <text x="65" y="106" font-family="system-ui, sans-serif" font-size="8" fill="#C7D2FE" text-anchor="middle">Month + costs</text>
  </g>

  <!-- 9 Discrepancy -->
  <g transform="translate(636, 280)" filter="url(#shadow)">
    <rect width="130" height="108" rx="12" fill="url(#roseGrad)" />
    <path d="M48,58 L58,68 L82,44" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M48,58 L58,48" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <text x="65" y="84" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">SCOPE CHECK</text>
    <text x="65" y="96" font-family="system-ui, sans-serif" font-size="8" fill="#FECDD3" text-anchor="middle">Invoice vs infra</text>
    <text x="65" y="106" font-family="system-ui, sans-serif" font-size="8" fill="#FECDD3" text-anchor="middle">discrepancies</text>
  </g>

  <!-- Workspace arrows -->
  <path d="M226,334 H272" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigo)" />
  <path d="M406,334 H452" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigo)" />
  <path d="M586,334 H632" fill="none" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigo)" />

  <!-- DB connections (dashed) -->
  <path d="M546,218 V250 H161 V280" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)" />
  <path d="M546,218 V250 H341 V280" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5 4" />
  <path d="M546,218 V250 H521 V280" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5 4" />
  <text x="400" y="242" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#7C3AED" text-anchor="middle">read / write via Prisma</text>

  <!-- Navigation note -->
  <rect x="36" y="430" width="848" height="100" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="458" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Active UI navigation</text>
  <text x="56" y="478" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Dashboard · Projects · Invoice ledger</text>
  <text x="56" y="498" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Billing grids exclude FX metadata (fxInrPerUsd) · Optional env filter when 2+ invoice environments</text>
  <text x="56" y="516" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Docs: docs/DATABASE.md · docs/FEATURES.md · docs/ARCHITECTURE.md</text>
</svg>
