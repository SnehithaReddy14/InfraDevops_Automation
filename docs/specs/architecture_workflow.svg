<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#EFF6FF" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4338CA" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748B" />
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#6366F1" />
    </marker>
  </defs>

  <rect width="920" height="560" rx="16" fill="url(#bgGrad)" />
  <rect width="920" height="560" rx="16" fill="none" stroke="#E2E8F0" stroke-width="2" />

  <text x="460" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#0F172A" text-anchor="middle">AWS BILLING AUTOMATION</text>
  <text x="460" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#64748B" text-anchor="middle">Invoice ingestion · Project workspaces · Dynamic billing · PostgreSQL</text>

  <!-- Row label: Invoice pipeline -->
  <text x="36" y="98" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">INVOICE PIPELINE</text>

  <!-- 1 Upload -->
  <g transform="translate(36, 110)" filter="url(#shadow)">
    <rect width="120" height="108" rx="12" fill="url(#blueGrad)" />
    <path d="M42,32 H78 L86,40 V78 H42 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round" />
    <path d="M56,72 V54 M48,62 L56,54 L64,62" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="60" y="92" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">UPLOAD</text>
    <text x="60" y="104" font-family="system-ui, sans-serif" font-size="8" fill="#93C5FD" text-anchor="middle">Project-scoped PDF</text>
  </g>

  <!-- 2 Parser -->
  <g transform="translate(186, 110)" filter="url(#shadow)">
    <rect width="120" height="108" rx="12" fill="url(#indigoGrad)" />
    <rect x="48" y="34" width="24" height="24" rx="5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="60" cy="46" r="4" fill="#FFFFFF" />
    <text x="60" y="88" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">PARSER / OCR</text>
    <text x="60" y="100" font-family="system-ui, sans-serif" font-size="7.5" fill="#C7D2FE" text-anchor="middle">Gemini · E2E · Jira</text>
    <text x="60" y="109" font-family="system-ui, sans-serif" font-size="7.5" fill="#C7D2FE" text-anchor="middle">subscriptionLines</text>
  </g>

  <!-- 3 Verify -->
  <g transform="translate(336, 110)" filter="url(#shadow)">
    <rect width="120" height="108" rx="12" fill="url(#tealGrad)" />
    <path d="M42,38 L54,50 L78,28" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="38" y="58" width="44" height="4" rx="2" fill="#FFFFFF" opacity="0.85"/>
    <rect x="38" y="66" width="32" height="4" rx="2" fill="#FFFFFF" opacity="0.85"/>
    <text x="60" y="88" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">VERIFY</text>
    <text x="60" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#99F6E4" text-anchor="middle">InvoiceDetail</text>
    <text x="60" y="109" font-family="system-ui, sans-serif" font-size="8" fill="#99F6E4" text-anchor="middle">Seats &amp; line items</text>
  </g>

